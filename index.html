<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>입력 양식 작성하기</title>
  </head>
  <body>
    <!-- 폼을 만드는 태그. -->
    <form>
      <!-- 기본정보  -->
      <fieldset>
        <legend>기본정보</legend>

        <!-- 아이디 입력창 -->
        <p>
          <label for="userid">아이디</label>
          <input type="text" id="userid" />
        </p>

        <!-- 비밀번호 입력창 -->
        <p>
          <label for="passwd">비밀번호</label>
          <input type="password" id="passwd" />
        </p>

      </fieldset>

      <!-- 선택 정보영역. -->
      <fieldset>
        <legend>선택 정보영역.</legend>

<!-- 나이 : type - number -->

        <p>
            <label for="age">나이</label>
            <input type="number" id="age">
        </p>


<!-- 추천인 : type - text -->
        <p>
            <label for="goodpeople">추천인</label>
            <input type="text" id="goodpeople">

        </p>


      </fieldset>
    </form>
  </body>
</html>
